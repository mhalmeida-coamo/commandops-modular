# CommandOps Modular — Labels Override
#
# Aplica labels commandops.module.* nos containers do projeto original
# SEM modificar o docker-compose.yml original.
#
# Uso:
#   docker compose \
#     -f /opt/commandops/app/docker-compose.yml \
#     -f /opt/commandops-modular/labels-override.yml \
#     up -d
#
# O projeto original continua funcionando normalmente.
# As labels são apenas metadados — não afetam comportamento.

services:

  mdm_ms:
    labels:
      commandops.module: "true"
      commandops.module.id: "mdm"
      commandops.module.name: "MDM (MobiControl)"
      commandops.module.section: "devices"
      commandops.module.permission: "mdm"
      commandops.module.version: "${MDM_MS_VERSION:-1.0.0}"
      commandops.module.health_path: "/health"

