# CommandOps Modular — Stack independente
# Para subir: docker compose -f /opt/commandops-modular/docker-compose.yml up -d

services:

  module-registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: commandops-module-registry
    restart: unless-stopped
    environment:
      POLL_INTERVAL: "30"
      MODULES_CONFIG: "/app/modules_config.yml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./registry/modules_config.yml:/app/modules_config.yml:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - commandops-modular

  shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    container_name: commandops-modular-shell
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      module-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - commandops-modular   # para alcançar o module-registry
      - commandops_commandops # para alcançar o commandops-api (auth + módulos)

networks:
  commandops-modular:
    driver: bridge
  commandops_commandops:
    external: true  # rede do projeto original, já existente
