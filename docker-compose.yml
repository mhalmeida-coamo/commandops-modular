services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commandops_registry
      POSTGRES_USER: commandops
      POSTGRES_PASSWORD: commandops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commandops"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Module Registry ─────────────────────────────────────────────────────────
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: postgresql://commandops:commandops@postgres:5432/commandops_registry
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SERVICE_SECRET: ${SERVICE_SECRET:-dev-service-secret-change-in-prod}
      VPN_PUBLIC_URL: ${VPN_PUBLIC_URL:-http://localhost:5101}
      VPN_INTERNAL_URL: http://vpn:8080
    ports:
      - "5010:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AD Worker ───────────────────────────────────────────────────────────────
  adworker:
    build:
      context: ./services/adworker
      dockerfile: Dockerfile
    environment:
      AD_REALM: ${AD_REALM:-COAMO.COM.BR}
      AD_DOMAIN: ${AD_DOMAIN:-coamo.com.br}
      AD_BASE_DN: ${AD_BASE_DN:-DC=coamo,DC=com,DC=br}
      AD_LDAP_SERVER: ${AD_LDAP_SERVER:-admdc01.coamo.com.br}
      AD_LDAP_PORT: ${AD_LDAP_PORT:-389}
      AD_KRB5_CONFIG: /etc/krb5.conf
      AD_KEYTAB_PATH: /run/secrets/svc_infratools_ad.keytab
      AD_SERVICE_PRINCIPAL: ${AD_SERVICE_PRINCIPAL:-svc_infratools_ad@COAMO.COM.BR}
      AD_WORKER_API_TOKEN: ${AD_WORKER_TOKEN}
      AD_WORKER_AUTO_KINIT: ${AD_WORKER_AUTO_KINIT:-true}
      AD_WORKER_ALLOW_PASSWORD_OPS: ${AD_WORKER_ALLOW_PASSWORD_OPS:-false}
      AD_WORKER_DEFAULT_DRY_RUN: ${AD_WORKER_DEFAULT_DRY_RUN:-true}
    volumes:
      - ./services/adworker/krb5.conf:/etc/krb5.conf:ro
      - ${AD_WORKER_KEYTAB_PATH:-/opt/commandops/secrets/svc_infratools_ad.keytab}:/run/secrets/svc_infratools_ad.keytab:ro
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── VPN Module ──────────────────────────────────────────────────────────────
  vpn:
    build:
      context: ./modules/vpn
      dockerfile: backend/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      SHELL_ORIGIN: http://localhost:5000
      REGISTRY_URL: http://registry:8000
      SERVICE_SECRET: ${SERVICE_SECRET:-dev-service-secret-change-in-prod}
    ports:
      - "5101:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Gateway (nginx) ─────────────────────────────────────────────────────────
  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - vpn

  # ── Shell (frontend host) ───────────────────────────────────────────────────
  shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    depends_on:
      registry:
        condition: service_healthy

volumes:
  postgres_data:
