server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Module Registry (stack commandops-modular, porta 9000)
    location /registry/ {
        set $registry_upstream http://module-registry:9000;
        rewrite ^/registry/(.*) /$1 break;
        proxy_pass $registry_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CommandOps API original — autenticação + chamadas dos módulos
    location /api/ {
        set $api_upstream http://commandops-api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
}
