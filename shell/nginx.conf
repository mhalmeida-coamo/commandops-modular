server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream IPs are re-resolved after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /registry/ {
        set $registry_upstream http://registry:8000;
        rewrite ^/registry/(.*) /$1 break;
        proxy_pass $registry_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location /api/ {
        set $gateway_upstream http://gateway;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
}
