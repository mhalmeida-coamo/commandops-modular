upstream vpn_module {
    server vpn:8080;
}

upstream cypress_module {
    server cypress:8080;
}

server {
    listen 80;
    client_max_body_size 20M;

    # VPN module API
    location /api/vpn/ {
        proxy_pass http://vpn_module/api/vpn/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # VPN module static assets (remoteEntry.js)
    location /module/vpn/ {
        proxy_pass http://vpn_module/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    # Cypress module API
    location /api/cypress/ {
        proxy_pass http://cypress_module/api/cypress/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Cypress module static assets (remoteEntry.js)
    location /module/cypress/ {
        proxy_pass http://cypress_module/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    # Health checks
    location /gateway/health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }
}
